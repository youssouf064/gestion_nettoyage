<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Site - Gestion Nettoyage</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm max-width" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Modifier le site</h4>
            </div>
            <div class="card-body">
                <form action="/modifier_site/{{ site.id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nom du Site :</label>
                        <input type="text" name="nom_site" class="form-control" value="{{ site.nom_site }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Adresse / Zone (ex: Tevragh Zeina) :</label>
                        <input type="text" name="adresse" class="form-control" value="{{ site.adresse }}" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/sites" class="btn btn-secondary">Annuler</a>
                        <button type="submit" class="btn btn-success">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
