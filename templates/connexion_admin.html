<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Restreint - Direction</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; display: flex; height: 100vh; justify-content: center; align-items: center; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; max-width: 360px; width: 100%; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 25px; }
        input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1.1rem; text-align: center; letter-spacing: 5px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background-color: #2980b9; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #217dbb; }
        .error { color: #e74c3c; font-weight: bold; margin-bottom: 15px; font-size: 0.9rem; }
        .btn-back { display: inline-block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔒 Espace Direction</h2>
    <p>Cet espace est réservé à l'administration. Veuillez saisir le code secret pour entrer.</p>
    
    {% if erreur %}
        <div class="error">{{ erreur }}</div>
    {% endif %}

    <form action="/" method="POST">
        <input type="password" name="code_admin" placeholder="••••" maxlength="6" required autocomplete="off">
        <button type="submit">🔑 Valider l'accès</button>
    </form>

    <a href="/pointage" class="btn-back">⬅️ Retour à l'Espace Terrain</a>
</div>

</body>
</html>
